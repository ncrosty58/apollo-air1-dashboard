services:
  web:
    container_name: apollo-air1-dashboard
    build: .
    ports:
      - "5960:5858"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PORT=5858
    volumes:
      - ./data:/app/data
    command: gunicorn -w 1 -b 0.0.0.0:5858 app:app
    restart: unless-stopped
