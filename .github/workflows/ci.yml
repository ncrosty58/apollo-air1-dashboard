name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test
    # Runs on the host-native self-hosted runner on bodhi (systemd --user
    # service github-runner-apollo-air1-dashboard, one per repo like the other
    # apps on the box). The Docker build job below stays on ubuntu-latest as a
    # clean-room PR check. If the runner is offline this job queues until it's
    # back.
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff lint
        run: ruff check .

      - name: Byte-compile all modules
        run: python -m compileall -q .

      - name: Run tests
        run: |
          # Exit code 5 = "no tests collected"; treat as pass until the suite lands.
          pytest -q || [ $? -eq 5 ]

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t apollo-air1-dashboard:ci .

  # Deploy the freshly-tested commit onto bodhi, the same host the runner lives
  # on -- git-pull-in-place + `docker compose up --build`, the pattern the other
  # apps on this box use. Only on a push to main (never PRs), and only after
  # both the tests and the clean-room image build pass. The env file and the
  # ./data bind live in the host checkout, so deploying from there (not the
  # runner's ephemeral _work checkout) keeps secrets and volume paths intact.
  deploy:
    name: Deploy
    needs: [lint-and-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Sync host checkout to this commit
        # -B pins the host dir onto main at exactly the tested SHA (on-branch,
        # not detached), discarding anything stale in the working tree.
        run: |
          git -C /home/nathan/projects/apollo-air1-dashboard fetch --prune origin
          git -C /home/nathan/projects/apollo-air1-dashboard checkout -B main ${{ github.sha }}
      - name: Rebuild and restart
        run: docker compose -f /home/nathan/projects/apollo-air1-dashboard/docker-compose.yml up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 20); do
            if curl -fsS -m 4 http://127.0.0.1:5960/healthz >/dev/null; then echo "healthy"; exit 0; fi
            sleep 3
          done
          echo "did not become healthy in time"; exit 1
      - name: Prune build cache
        run: |
          docker builder prune -f
          docker image prune -f
