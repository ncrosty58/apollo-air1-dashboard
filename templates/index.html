<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Apollo AIR-1 — Cosmos Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <meta name="theme-color" content="#5fc9c1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AIR-1">
  <script>
    // Applied before first paint so a saved dark-mode choice never flashes light.
    (function () {
      var t = localStorage.getItem("apollo-air1-theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>


<div class="faceplate">
  <div class="faceplate-inner">
    <div class="device-id">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 64 64" role="img" aria-label="Cosmos Lab">
          <rect x="0" y="0" width="64" height="64" rx="14" fill="var(--panel-sunken)" />
          <ellipse cx="32" cy="32" rx="21" ry="12.5" fill="none" stroke="var(--accent)" stroke-width="3.2" transform="rotate(-28 32 32)" />
          <circle cx="45.5" cy="20" r="4.4" fill="var(--accent)" />
          <circle cx="32" cy="32" r="2.1" fill="var(--ink)" />
        </svg>
        <span class="brand-word">Cosmos Lab</span>
      </div>
      <span class="id-divider"></span>
      <span class="lamp pulse-once" id="lamp" data-state="mqtt" role="img" aria-label="Connection status"></span>
      <div class="device-name-block">
        <span class="device-name">APOLLO AIR-1</span>
        <span class="device-sub" id="device-sub"><span id="conn-status" aria-live="polite">Connecting…</span></span>
      </div>
    </div>
    <div class="header-controls">
      <button type="button" class="settings-gear" id="settings-toggle" aria-haspopup="true" aria-expanded="false" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M12 3v2.4M12 18.6V21M5.4 5.4l1.7 1.7M16.9 16.9l1.7 1.7M3 12h2.4M18.6 12H21M5.4 18.6l1.7-1.7M16.9 7.1l1.7-1.7"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="settings-backdrop" id="settings-backdrop" hidden></div>
<div class="settings-panel" id="settings-panel" role="dialog" aria-label="Settings" hidden>
  <div class="settings-panel-head">Settings</div>
  <div class="settings-row">
    <span class="cl-name">Units</span>
    <div class="settings-rail unit-toggle" role="tablist" aria-label="Temperature unit">
      <button type="button" data-unit="f" aria-pressed="true">°F</button>
      <button type="button" data-unit="c" aria-pressed="false">°C</button>
    </div>
  </div>
  <div class="settings-row">
    <span class="cl-name">Theme</span>
    <div class="settings-rail theme-toggle" role="tablist" aria-label="Color theme">
      <button type="button" data-theme-choice="light" aria-pressed="true">Light</button>
      <button type="button" data-theme-choice="dark" aria-pressed="false">Dark</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- ============ BASIC VIEW ============ -->
  <section class="view view-fade" id="view-simple">
    <div class="rack-grid">

      <div class="rack rack--inside">
        <div class="rack-head">
          <div class="rack-zone"><span class="zone-dot"></span> Inside</div>
          <div class="rack-stat">
            <span class="rack-aqi" id="in-aqi" style="--band-color: var(--ink-dim);">—</span>
            <div class="rack-stat-text">
              <span class="rack-category" id="in-category" aria-live="polite">Waiting for a reading…</span>
              <span class="rack-sub" id="in-sub">—</span>
            </div>
            <div class="rack-spark" id="in-spark"></div>
          </div>
        </div>
        <div class="rack-rows" id="inside-rows"></div>
        <div class="rack-foot">
          <span class="rack-updated" id="in-updated"></span>
          <div class="rack-foot-links">
            <a class="pill-link" href="/indoor">Details →</a>
          </div>
        </div>
      </div>

      <div class="rack rack--outside">
        <div class="rack-head">
          <div class="rack-zone"><span class="zone-dot"></span> Outside <span class="rack-area" id="outside-area">—</span></div>
          <div class="provider-chips" id="provider-chips"></div>
          <div class="rack-stat">
            <span class="rack-aqi" id="out-aqi" style="--band-color: var(--ink-dim);">—</span>
            <div class="rack-stat-text">
              <span class="rack-category" id="out-category" aria-live="polite">Loading…</span>
              <span class="rack-sub" id="out-sub">—</span>
            </div>
            <div class="rack-spark" id="out-spark"></div>
          </div>
        </div>
        <div class="rack-rows" id="outside-rows"></div>
        <div class="rack-foot">
          <span class="rack-updated" id="out-updated"></span>
          <div class="outside-discussion" id="outside-discussion"></div>
          <div class="rack-foot-links">
            <a class="pill-link" href="/technical">Details →</a>
            <a class="pill-link" href="/forecast" id="forecast-link">Forecast →</a>
          </div>
        </div>
      </div>

    </div>
  </section>

  <footer class="page-footer">
    <span>Cosmos Lab · apollo-air1-dashboard</span>
    <span id="footer-clock"></span>
  </footer>
</div>


<script src="{{ url_for('static', filename='aqi.js') }}"></script>
<script src="{{ url_for('static', filename='common.js') }}"></script>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
